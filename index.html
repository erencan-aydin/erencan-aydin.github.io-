<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Erencan'ın Öğrenme Merkezi | Pro Mode v2</title>
<style>
:root {
  --bg: #f6f7fb; --text: #0a092d; --card-bg: #ffffff; --border: #e1e5ee;
  --btn-bg: #423ed8; --btn-text: #ffffff; --sub-text: #6b7280; --input-bg: #f9fafc;
  --accent: #423ed8; --danger: #ff4d4d; --success: #23b26d; --warn: #f59e0b;
}
body.dark {
  --bg: #0a092d; --text: #f6f7fb; --card-bg: #2e3856; --border: #1a1d28;
  --btn-bg: #4255ff; --btn-text: #ffffff; --sub-text: #939bb4; --input-bg: #1a1d28;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background-color: var(--bg); color:var(--text); font-size:14px; line-height:1.5;
  transition: background 0.3s, color 0.3s; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
.app{max-width:800px;margin:0 auto;min-height:100vh;padding:1.5rem}
.page{display:none; animation: fadeIn 0.2s ease-out;}
.page.active{display:block}
@keyframes fadeIn { from {opacity: 0; transform: translateY(5px);} to {opacity: 1; transform: translateY(0);} }

/* Gelişmiş Yükleme Ekranı */
#app-loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: var(--bg); display: flex; flex-direction: column; align-items: center; 
    justify-content: center; z-index: 9999; font-weight: 700; color: var(--accent);
}
.spinner {
    width: 40px; height: 40px; border: 4px solid var(--border);
    border-top: 4px solid var(--accent); border-radius: 50%;
    animation: spin 1s linear infinite; margin-bottom: 15px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* UI Elemanları */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 8px; border-radius: 50%; color: var(--text); }
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;margin-left:8px;vertical-align:middle}
.sync-dot.online{background:var(--success); box-shadow: 0 0 8px var(--success)}
.heatmap-container { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem; }
.heatmap-grid { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 5px; }
.heat-box { width: 14px; height: 14px; border-radius: 3px; background: var(--border); flex-shrink: 0; }
.heat-1 { background: rgba(35, 178, 109, 0.3); } .heat-4 { background: #166534; }
.btn{ height:40px;padding:0 20px;border-radius:8px;border:1px solid var(--border); background:var(--card-bg);color:var(--text);font-size:14px;font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
.btn-filled{background:var(--btn-bg);color:var(--btn-text);border-color:transparent}
input, textarea, select { width:100%; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); outline:none; padding: 12px; font-family: inherit; }
.folder-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.folder-card{ background:var(--card-bg);border:1px solid var(--border);border-radius:12px; padding:1.5rem; cursor:pointer; min-height:110px; display: flex; flex-direction: column; justify-content: space-between; }
.badge-due { background: var(--warn); color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
.card-slide{ background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:2.5rem 1.5rem; text-align:center; min-height:400px; display:flex; flex-direction:column; align-items:center; justify-content:center; position: relative; transition: transform 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,0.08); touch-action: none;}
.study-img{ max-width:100%; max-height:200px; border-radius:12px; margin-bottom:24px; object-fit:contain; }
.study-word{ font-size:32px; font-weight:700; word-break: break-word; white-space: pre-wrap; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:100; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; backdrop-filter: blur(4px); }
.modal-content { background: var(--card-bg); border-radius: 16px; padding: 2rem; width: 90%; max-width: 450px; }

@media (max-width: 600px) { .folder-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body class="dark">
<div class="app">

<div id="app-loading"><div class="spinner"></div><span>Veriler senkronize ediliyor...</span></div>

<div id="page-auth" class="page">
    <div style="margin: 60px auto; background: var(--card-bg); padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.1)">
      <h2 style="margin-bottom:20px">Giriş Yap</h2>
      <input type="email" id="auth-email" placeholder="E-posta" style="margin-bottom: 12px;" />
      <input type="password" id="auth-pass" placeholder="Şifre" style="margin-bottom: 20px;"/>
      <div id="auth-error" style="color:var(--danger); font-size:12px; margin-bottom:10px; display:none"></div>
      <button class="btn btn-filled" style="width:100%" id="btn-auth-action" onclick="handleAuth()">Devam Et</button>
      <div style="text-align: center; margin-top: 20px;"><a href="javascript:void(0)" onclick="toggleAuthMode()" id="auth-toggle-link" style="color:var(--accent); text-decoration:none; font-size:13px">Hesap Oluştur</a></div>
    </div>
</div>

<div id="page-home" class="page">
  <div class="topbar">
    <div class="topbar-title" style="font-weight:700">Öğrenme Merkezi <span class="sync-dot" id="sync-dot"></span></div>
    <div class="topbar-actions"><button class="icon-btn" onclick="toggleDarkMode()">🌓</button><button class="icon-btn" onclick="handleLogout()">🚪</button></div>
  </div>
  <div class="heatmap-container"><div class="heatmap-grid" id="heatmap-grid"></div></div>
  <div style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
      <h3 style="font-weight: 700;">Setlerin</h3><button class="btn btn-filled" onclick="showPage('new-folder')">+ Yeni Set</button>
  </div>
  <div class="folder-grid" id="folder-grid"></div>
</div>

<div id="page-folder" class="page">
  <div class="topbar"><div onclick="goHome()" style="cursor:pointer; font-weight: 600">← Geri</div><button class="btn btn-filled" onclick="startStudy()" id="btn-start-study">Çalış</button></div>
  <h2 id="fh-title" style="margin: 20px 0;"></h2>
  <div style="display:flex; justify-content:flex-end; margin-bottom: 15px;"><button class="btn" onclick="document.getElementById('csv-upload').click()">📄 CSV İçe Aktar</button></div>
  <input type="file" id="csv-upload" accept=".csv" style="display:none" onchange="handleCSVUpload(this)" />
  <div id="editor-list"></div>
  <div style="background:var(--card-bg); border-radius:12px; padding:2rem; text-align:center; border: 2px dashed var(--border); cursor:pointer; margin-top: 20px" onclick="addNewEmptyCard()">+ Yeni Kart Ekle</div>
</div>

<div id="page-study" class="page">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
    <div onclick="goFolder()" style="cursor:pointer; font-weight:600">← Bitir</div>
    <div style="display:flex; gap:10px; align-items:center">
        <select id="tts-lang" style="width:auto; padding:5px;">
            <option value="en-US">🇬🇧 EN</option><option value="de-DE">🇩🇪 DE</option><option value="zh-CN">🇨🇳 ZH</option><option value="tr-TR">🇹🇷 TR</option>
        </select>
        <button class="icon-btn" onclick="toggleWriteMode()">⌨️</button>
        <div id="s-progress" style="font-weight: 600; min-width: 50px; text-align:right">1 / 10</div>
    </div>
  </div>
  <div id="study-active" style="position: relative;">
      <div class="card-slide" id="card-container" onclick="handleCardClick()">
          <button style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:20px; cursor:pointer; z-index:10" onclick="playAudio(event)">🔊</button>
          <img class="study-img" id="s-img" style="display:none" />
          <div class="study-word" id="s-text"></div>
          <div id="write-container" style="display:none; width:100%;"><input type="text" id="write-input" style="width:80%; margin:20px auto; display:block; text-align:center; font-size:18px" placeholder="Cevabı yaz..." autocomplete="off" /></div>
          <div style="font-size:13px; color:var(--sub-text); margin-top: 20px" id="s-hint">Dokun veya Kaydır</div>
      </div>
      <div id="s-action-row" style="display:none; gap:15px; margin-top:25px; justify-content:center">
        <button class="btn btn-danger" style="flex:1" onclick="markCard(false)">Bilemedim</button>
        <button class="btn btn-filled" style="flex:1; background:var(--success)" onclick="markCard(true)">Bildim</button>
      </div>
      <div style="display:flex; justify-content:center; gap:20px; margin-top:20px; font-weight:700">
          <span style="color:var(--success)">✓ <span id="score-right">0</span></span>
          <span style="color:var(--danger)">✕ <span id="score-wrong">0</span></span>
      </div>
  </div>
</div>

<div id="dict-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>📖 Sözlük Asistanı</h3>
        <input type="hidden" id="dict-card-id" /><input type="text" id="dict-word" style="font-weight:700; margin:15px 0" />
        <select id="dict-lang" style="margin-bottom:15px">
            <option value="en">🇬🇧 İngilizce</option><option value="de">🇩🇪 Almanca</option><option value="zh">🇨🇳 Çince</option>
        </select>
        <button class="btn btn-filled" style="width:100%; margin-bottom:15px" onclick="fetchDictionaryData()">Ara</button>
        <div id="dict-results" style="display:none; background:var(--bg); padding:10px; border-radius:8px; margin-bottom:15px;">
            <div id="dict-meaning" style="font-weight:700; margin-bottom:10px;"></div>
            <textarea id="dict-details" style="font-size:12px; height:80px" placeholder="Ek notlar..."></textarea>
        </div>
        <div style="display:flex; gap:10px;"><button class="btn" style="flex:1" onclick="document.getElementById('dict-modal').style.display='none'">İptal</button><button class="btn btn-filled" style="flex:1" onclick="applyDictionaryData()">Karta Ekle</button></div>
    </div>
</div>

<div id="page-new-folder" class="page">
    <div style="margin: 60px auto; background: var(--card-bg); padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border)">
        <h3>Yeni Set</h3><input type="text" id="nf-name" placeholder="Başlık..." style="margin: 15px 0" />
        <div style="display:flex; gap:10px"><button class="btn" style="flex:1" onclick="goHome()">İptal</button><button class="btn btn-filled" style="flex:1" onclick="createFolder()">Oluştur</button></div>
    </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJJEYEFyIDiV1zS4-BLyJ0p_wuGJVq1Ws",
  authDomain: "flashcard-1e281.firebaseapp.com",
  projectId: "flashcard-1e281",
  storageBucket: "flashcard-1e281.firebasestorage.app"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

let currentUser, docRef, folders = [], userStats = {}, roundQueue = [], qIdx = 0, isWriteMode = false;
let sessionRight = 0, sessionWrong = 0, hasRevealedOnce = false, isReg = false;

// Sayfa Yönetimi
window.showPage = id => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('page-' + id);
    if(target) target.classList.add('active');
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user; docRef = doc(db, "users", user.uid);
    onSnapshot(docRef, snap => {
      document.getElementById('app-loading').style.display = 'none';
      if(snap.exists()) { const data = snap.data(); folders = data.folders || []; userStats = data.stats || {}; renderFolders(); renderHeatmap(); } 
      else { setDoc(docRef, {folders: [], stats: {}}); }
      if(!document.querySelector('.page.active')) showPage('home');
    });
  } else { document.getElementById('app-loading').style.display = 'none'; showPage('auth'); }
});

// Auth İşlemleri
window.handleAuth = async () => {
    const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
    const err = document.getElementById('auth-error');
    if(!e || !p) return;
    try {
        err.style.display = 'none';
        if(isReg) await createUserWithEmailAndPassword(auth, e, p);
        else await signInWithEmailAndPassword(auth, e, p);
    } catch(errObj) { err.textContent = errObj.message; err.style.display = 'block'; }
};
window.toggleAuthMode = () => {
    isReg = !isReg;
    document.getElementById('btn-auth-action').textContent = isReg ? "Kayıt Ol" : "Devam Et";
    document.getElementById('auth-toggle-link').textContent = isReg ? "Zaten hesabım var" : "Hesap Oluştur";
};
window.handleLogout = () => signOut(auth);
window.toggleDarkMode = () => { const isDark = document.body.classList.toggle('dark'); localStorage.setItem('dark-mode', isDark); };
if(localStorage.getItem('dark-mode') === 'true') document.body.classList.add('dark');

// Folder ve Kart İşlemleri
window.renderFolders = () => {
  const now = Date.now();
  document.getElementById('folder-grid').innerHTML = folders.map(f => {
      const due = f.cards.filter(c => !c.nextReview || c.nextReview <= now).length;
      return `<div class="folder-card" onclick="openFolder('${f.id}')"><div class="folder-name">${f.name}</div><div style="font-size:12px; color:var(--sub-text)">${f.cards.length} Terim ${due > 0 ? `<span class="badge-due">${due} Bekleyen</span>` : ''}</div></div>`;
  }).join('');
};

window.openFolder = id => {
  const f = folders.find(x => x.id === id);
  if(!f) return;
  selFolder = f;
  document.getElementById('fh-title').textContent = selFolder.name;
  renderEditor(); showPage('folder');
};

window.renderEditor = () => {
  document.getElementById('editor-list').innerHTML = selFolder.cards.map(c => `
    <div style="background:var(--card-bg); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border); display:flex; gap:15px; position:relative">
      <div style="flex:1">
        <input type="text" id="front-${c.id}" value="${c.front}" onchange="updateCardText('${c.id}', 'front', this.value)" style="margin-bottom:8px" placeholder="Ön yüz" />
        <textarea id="back-${c.id}" onchange="updateCardText('${c.id}', 'back', this.value)" style="height:44px" placeholder="Arka yüz">${c.back}</textarea>
        <button onclick="openDictionary('${c.id}')" style="background:none; border:none; position:absolute; right:60px; bottom:25px; cursor:pointer; font-size:18px">📖</button>
      </div>
      <div style="display:flex; flex-direction:column; gap:10px; align-items:center">
        <div onclick="document.getElementById('file-${c.id}').click()" style="width:50px; height:50px; border:1px dashed var(--border); border-radius:8px; cursor:pointer; overflow:hidden">
            ${c.image ? `<img src="${c.image}" style="width:100%; height:100%; object-fit:cover" />` : `<div style="padding:15px">🖼️</div>`}
        </div>
        <input type="file" id="file-${c.id}" accept="image/*" style="display:none" onchange="uploadImage('${c.id}', this)" />
        <button onclick="deleteCard('${c.id}')" style="background:none; border:none; font-size:18px; cursor:pointer">🗑️</button>
      </div>
    </div>
  `).join('');
};

window.updateCardText = async (id, f, v) => { const c = selFolder.cards.find(x => x.id === id); if(c) { c[f] = v; await setDoc(docRef, {folders, stats: userStats}); } };
window.deleteCard = async (id) => { if(confirm("Kart silinsin mi?")) { selFolder.cards = selFolder.cards.filter(x => x.id !== id); renderEditor(); await setDoc(docRef, {folders, stats: userStats}); } };
window.addNewEmptyCard = async () => { selFolder.cards.push({ id: Date.now().toString(), front: '', back: '', reps: 0, interval: 0, ease: 2.5 }); renderEditor(); await setDoc(docRef, {folders, stats: userStats}); };

// Çalışma Mantığı
window.startStudy = () => {
  const now = Date.now();
  let due = selFolder.cards.filter(c => c.front && c.back && (!c.nextReview || c.nextReview <= now));
  if(due.length === 0) { if(confirm("Vadesi gelen yok. Hepsini çalış?")) due = selFolder.cards; else return; }
  roundQueue = [...due].sort(() => Math.random() - 0.5);
  qIdx = 0; sessionRight = 0; sessionWrong = 0;
  document.getElementById('score-right').textContent = 0; document.getElementById('score-wrong').textContent = 0;
  showPage('study'); loadCard();
};

function loadCard() {
  const c = roundQueue[qIdx];
  document.getElementById('s-text').textContent = c.front;
  document.getElementById('s-progress').textContent = `${qIdx + 1} / ${roundQueue.length}`;
  const img = document.getElementById('s-img');
  img.style.display = c.image ? 'block' : 'none'; if(c.image) img.src = c.image;
  document.getElementById('s-action-row').style.display = 'none';
  hasRevealedOnce = false;
  document.getElementById('write-input').value = "";
  document.getElementById('write-container').style.display = isWriteMode ? "block" : "none";
}

window.handleCardClick = () => {
  if(isWriteMode) return;
  if(!hasRevealedOnce) { hasRevealedOnce = true; document.getElementById('s-action-row').style.display = 'flex'; }
  const c = roundQueue[qIdx];
  const t = document.getElementById('s-text');
  t.textContent = (t.textContent === c.front) ? c.back : c.front;
};

window.markCard = async (correct) => {
  const c = selFolder.cards.find(x => x.id === roundQueue[qIdx].id);
  if(!c.reps) { c.reps = 0; c.interval = 1; c.ease = 2.5; }
  if(correct) { sessionRight++; c.reps++; c.interval = (c.reps === 1) ? 1 : (c.reps === 2 ? 6 : Math.round(c.interval * c.ease)); }
  else { sessionWrong++; c.reps = 0; c.interval = 1; c.ease = Math.max(1.3, c.ease - 0.2); }
  c.nextReview = Date.now() + (c.interval * 86400000);
  const today = new Date().toISOString().split('T')[0]; userStats[today] = (userStats[today] || 0) + 1;
  document.getElementById('score-right').textContent = sessionRight; document.getElementById('score-wrong').textContent = sessionWrong;
  qIdx++;
  if(qIdx >= roundQueue.length) { await setDoc(docRef, {folders, stats: userStats}); goFolder(); } else loadCard();
};

window.toggleWriteMode = () => { isWriteMode = !isWriteMode; loadCard(); };
document.getElementById('write-input').addEventListener('keypress', e => {
    if(e.key === 'Enter') {
        const correct = roundQueue[qIdx].back.split('\n')[0].trim().toLowerCase();
        if(e.target.value.trim().toLowerCase() === correct) { markCard(true); } 
        else { hasRevealedOnce = true; document.getElementById('s-text').textContent = roundQueue[qIdx].back; document.getElementById('s-action-row').style.display = 'flex'; }
    }
});

// Sözlük ve Diğerleri
window.openDictionary = (id) => {
    document.getElementById('dict-card-id').value = id;
    document.getElementById('dict-word').value = document.getElementById(`front-${id}`).value;
    document.getElementById('dict-modal').style.display = 'flex';
};
window.fetchDictionaryData = async () => {
    const w = document.getElementById('dict-word').value, l = document.getElementById('dict-lang').value;
    document.getElementById('dict-results').style.display = 'block'; document.getElementById('dict-meaning').textContent = "Aranıyor...";
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(w)}&langpair=${l}|tr`);
    const data = await res.json(); document.getElementById('dict-meaning').textContent = data.responseData.translatedText;
};
window.applyDictionaryData = () => {
    const id = document.getElementById('dict-card-id').value;
    const val = document.getElementById('dict-meaning').textContent + "\n" + document.getElementById('dict-details').value;
    document.getElementById(`back-${id}`).value = val; updateCardText(id, 'back', val);
    document.getElementById('dict-modal').style.display = 'none';
};
window.uploadImage = async (id, input) => {
    const file = input.files[0]; if(!file) return;
    const sRef = ref(storage, `users/${currentUser.uid}/${id}_${Date.now()}`);
    await uploadBytes(sRef, file); const url = await getDownloadURL(sRef);
    const c = selFolder.cards.find(x => x.id === id); c.image = url; renderEditor(); await setDoc(docRef, {folders, stats: userStats});
};
window.createFolder = async () => {
    const n = document.getElementById('nf-name').value; if(!n) return;
    folders.unshift({id: Date.now().toString(), name: n, cards: []});
    await setDoc(docRef, {folders, stats: userStats}); goHome();
};
window.goHome = () => showPage('home');
window.goFolder = () => showPage('folder');
window.playAudio = (e) => { e.stopPropagation(); const u = new SpeechSynthesisUtterance(document.getElementById('s-text').textContent); u.lang = document.getElementById('tts-lang').value; window.speechSynthesis.speak(u); };

function renderHeatmap() {
    const g = document.getElementById('heatmap-grid'); g.innerHTML = "";
    const today = new Date();
    for(let i=59; i>=0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const s = d.toISOString().split('T')[0];
        const count = userStats[s] || 0;
        const heat = count > 20 ? 'heat-4' : (count > 0 ? 'heat-1' : '');
        g.innerHTML += `<div class="heat-box ${heat}" title="${s}: ${count}"></div>`;
    }
}

let tStart = 0;
document.getElementById('card-container').addEventListener('touchstart', e => tStart = e.changedTouches[0].screenX, {passive:true});
document.getElementById('card-container').addEventListener('touchend', e => {
    if(isWriteMode || !hasRevealedOnce) return;
    const diff = e.changedTouches[0].screenX - tStart;
    if(diff > 70) markCard(true); if(diff < -70) markCard(false);
});
</script>
</body>
</html>
